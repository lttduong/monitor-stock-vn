name = "vn-stock-telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cloudflare Workers AI binding (fallback when Gemini is geo-restricted)
[ai]
binding = "AI"

# Smart placement - optimize for AI backend latency
[placement]
mode = "smart"

# Cron triggers (UTC times — Vietnam is UTC+7)
# 6:00 AM VN = 23:00 UTC previous day → Mon-Fri market briefing
# 11:30 AM VN = 04:30 UTC same day → Mon-Fri midday briefing
# 4:00 PM VN = 09:00 UTC same day → Mon-Fri afternoon briefing
# Every hour = News digest (24/7)
[triggers]
crons = ["0 23 * * 1,2,3,4,5", "30 4 * * 2,3,4,5,6", "0 9 * * 2,3,4,5,6", "0 * * * *"]

# Public vars (non-secret)
[vars]
TELEGRAM_CHAT_ID = "-5175947373"
WATCHLIST = "VCB,FPT,HPG,VNM,VHM,TCB,MWG,VPB,MBB,ACB"

# Secrets (set via `wrangler secret put`):
# - TELEGRAM_BOT_TOKEN
# - GEMINI_API_KEY
