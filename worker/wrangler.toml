name = "vn-stock-telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cron triggers (UTC times — Vietnam is UTC+7)
# 6:00 AM VN = 23:00 UTC previous day → Sun-Thu for Mon-Fri VN
# 11:30 AM VN = 04:30 UTC same day → Mon-Fri
# 4:00 PM VN = 09:00 UTC same day → Mon-Fri
[triggers]
crons = ["0 23 * * 0-4", "30 4 * * 1-5", "0 9 * * 1-5"]

# Public vars (non-secret)
[vars]
TELEGRAM_CHAT_ID = "-5175947373"
WATCHLIST = "VCB,FPT,HPG,VNM,VHM,TCB,MWG,VPB,MBB,ACB"

# Secrets (set via `wrangler secret put`):
# - TELEGRAM_BOT_TOKEN
# - GEMINI_API_KEY
